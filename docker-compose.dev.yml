services:
  dvadmin3-postgres:
    image: postgres:16-alpine
    container_name: dvadmin3-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudweave}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudweave123}
      POSTGRES_DB: ${POSTGRES_DB:-cloudweave}
      TZ: Asia/Shanghai
    # PostgreSQL 性能调优（开发环境，4GB 内存参考值）
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=6553kB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudweave} -d ${POSTGRES_DB:-cloudweave}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - "./docker_env/postgres/data:/var/lib/postgresql/data"
    networks:
      network:
        ipv4_address: 177.10.0.13

  dvadmin3-redis:
    image: redis:7.4-alpine
    container_name: dvadmin3-redis
    restart: always
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./docker_env/redis/data:/data
      - ./docker_env/redis/redis.conf:/etc/redis/redis.conf
    ports:
      - "6379:6379"
    sysctls:
      - net.core.somaxconn=1024
    command: /bin/sh -c "echo 'vm.overcommit_memory = 1' >> /etc/sysctl.conf && if [ -n '${REDIS_PASSWORD:-}' ]; then redis-server /etc/redis/redis.conf --appendonly yes --requirepass '${REDIS_PASSWORD}'; else redis-server /etc/redis/redis.conf --appendonly yes; fi"
    healthcheck:
      test: ["CMD-SHELL", "if [ -n '${REDIS_PASSWORD:-}' ]; then redis-cli -a '${REDIS_PASSWORD}' ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
    privileged: true
    networks:
      network:
        ipv4_address: 177.10.0.15


networks:
  network:
    ipam:
      driver: default
      config:
        - subnet: '177.10.0.0/16'

